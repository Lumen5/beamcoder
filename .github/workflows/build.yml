name: Build

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install FFmpeg with full codec support
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:savoury1/ffmpeg5
          sudo apt-get update
          sudo apt-get install -y libavcodec-dev libavformat-dev libavdevice-dev libavfilter-dev libavutil-dev libpostproc-dev libswresample-dev libswscale-dev libvpx-dev

      - name: Install dependencies and build
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: npx eslint '**/*.js'

      - name: Run tests
        run: npm test

  prebuild:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: macos-14
            platform: darwin
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libvpx-dev

      - name: Install system dependencies (macOS)
        if: matrix.platform == 'darwin'
        run: brew install libvpx

      - name: Install dependencies (skip native build)
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Download FFmpeg static libraries
        run: node install_ffmpeg_static.js

      - name: Build prebuild
        run: npx prebuild --strip -r node -t 20.0.0 -t 22.0.0 -t 24.0.0
        env:
          FFMPEG_STATIC: "1"

      - name: List prebuilds
        run: find prebuilds -name "*.tar.gz" -ls

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/**/*.tar.gz
